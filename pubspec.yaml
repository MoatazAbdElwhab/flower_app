name: flower_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  bloc_test: ^10.0.0
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  cupertino_icons: ^1.0.8
  device_preview: ^1.2.0
  dio: ^5.8.0+1
  easy_localization: ^3.0.0
  either_dart: ^1.0.0
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.0.17
  geocoding: ^2.1.1
  geolocator: ^10.0.1
  get_it: ^8.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.1
  injectable: ^2.5.0
  internet_connection_checker: ^3.0.1
  logger: ^2.5.0
  mockito: ^5.4.4
  otp_resend_timer: ^1.0.0
  pinput: ^5.0.1
  pretty_dio_logger: ^1.4.0
  rxdart: ^0.28.0
  google_maps_flutter:
  lottie:
  shared_preferences: ^2.5.1
  shimmer: ^3.0.0
  skeletonizer: ^1.4.3
  webview_flutter: ^4.10.0
  firebase_auth: ^5.5.2
  firebase_core:
  firebase_crashlytics:
  firebase_analytics:
  firebase_database: ^11.3.6
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.6.0
  json_serializable: null
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/flower_img.png"

flutter:

  uses-material-design: true

  assets:
    - assets/translations/
    - assets/icons/
    - assets/about_us.json
    - assets/common_locations/area.json
    - assets/common_locations/cities.json

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Black.ttf
          weight: 900
        - asset: assets/fonts/inter/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Light.ttf
          weight: 300
